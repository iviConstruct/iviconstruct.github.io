<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1220">

<title>ivi Construct | Construcții & Renovări</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#0b1220;
    --surface: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.12);
    --text:#fff;
    --muted: rgba(255,255,255,0.7);
    --accent:#00c6ff;
    --accent2:#7c3aed;
    --r:14px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Inter,sans-serif;
    background: radial-gradient(circle at top,#0b1220,#000);
    color:var(--text);
    overflow-x:hidden;
}

a{color:inherit;text-decoration:none}

/* NAV */
.nav{
    position:sticky;top:0;z-index:10;
    display:flex;justify-content:space-between;
    padding:14px 18px;
    background:rgba(0,0,0,.6);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--border);
}

.nav a{color:var(--muted);margin:0 8px}
.nav a:hover{color:#fff}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}
.hero h1{font-size:42px}
.hero p{color:var(--muted);margin-top:10px}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:14px;
    padding:40px;
}

/* CARD */
.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:16px;
    transition:.2s;
}
.card:hover{transform:translateY(-3px)}

.icon{
    width:26px;height:26px;
    color:var(--accent);
    margin-bottom:8px;
}

/* PORTFOLIO */
.portfolio{
    padding:40px;
}
.portfolio-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:14px;
}
.portfolio-item{
    position:relative;
    overflow:hidden;
    border-radius:var(--r);
    border:1px solid var(--border);
}
.portfolio-item img{
    width:100%;height:220px;object-fit:cover;
}
.portfolio-caption{
    position:absolute;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    gap:8px;
    align-items:center;
    padding:10px;
    background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
    font-size:14px;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    right:16px;bottom:16px;
    width:52px;height:52px;
    border-radius:50%;
    background:#25D366;
    display:flex;align-items:center;justify-content:center;
}

</style>
</head>

<body>

<!-- ICONS -->
<svg width="0" height="0" style="position:absolute">
<defs>

<symbol id="i-tiles" viewBox="0 0 24 24">
<path fill="currentColor" d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/>
</symbol>

<symbol id="i-finish" viewBox="0 0 24 24">
<path fill="currentColor" d="M4 4h16v4H4V4zm0 6h16v10H4V10z"/>
</symbol>

<symbol id="i-paint" viewBox="0 0 24 24">
<path fill="currentColor" d="M12 2l3 6h6l-5 4 2 7-6-4-6 4 2-7-5-4h6z"/>
</symbol>

</defs>
</svg>

<!-- NAV -->
<div class="nav">
<div><b>ivi Construct</b></div>
<div>
<a href="#services">Servicii</a>
<a href="#portfolio">Portfolio</a>
<a href="#contact">Contact</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<h1>Renovăm cu precizie</h1>
<p>Finisaje interioare și exterioare în București</p>
</section>

<!-- SERVICES -->
<section id="services" class="grid">

<div class="card">
<svg class="icon"><use href="#i-tiles"/></svg>
<b>Tencuială</b>
<p style="color:var(--muted)">Aplicare manuală pereți</p>
</div>

<div class="card">
<svg class="icon"><use href="#i-finish"/></svg>
<b>Glet & finisaje</b>
<p style="color:var(--muted)">Suprafețe perfecte</p>
</div>

<div class="card">
<svg class="icon"><use href="#i-paint"/></svg>
<b>Vopsea lavabilă</b>
<p style="color:var(--muted)">Finisaj premium</p>
</div>

</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="portfolio">

<h2 style="padding:0 40px 20px">Portofoliu</h2>

<div class="portfolio-grid">

<div class="portfolio-item">
<img src="gresie1.jpg">
<div class="portfolio-caption">
<svg class="icon"><use href="#i-tiles"/></svg>
Gresie & faianță
</div>
</div>

<div class="portfolio-item">
<img src="Baie moderna.jpg">
<div class="portfolio-caption">
<svg class="icon"><use href="#i-finish"/></svg>
Baie la cheie
</div>
</div>

<div class="portfolio-item">
<img src="IMG_20250603_163127.jpg">
<div class="portfolio-caption">
<svg class="icon"><use href="#i-paint"/></svg>
Finisaje
</div>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="grid">

<div class="card">
<b>Contact</b>
<p style="color:var(--muted)">+40 764 843 411</p>
</div>

</section>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/40764843411">💬</a>

</body>
</html>
