<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iviConstruct</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

/* BODY */
body {
    color: white;
    background: radial-gradient(circle at top, #1a1a2e, #000);
    overflow-x: hidden;
}

/* glow */
body::before,
body::after {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    filter: blur(120px);
    z-index: -1;
}

body::before {
    background: radial-gradient(circle, #00c6ff, transparent);
    top: -200px;
    left: -200px;
}

body::after {
    background: radial-gradient(circle, #0072ff, transparent);
    bottom: -200px;
    right: -200px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    position:sticky;
    top:0;
    background:rgba(0,0,0,0.3);
    backdrop-filter:blur(12px);
    z-index:100;
}

.nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    opacity:0.7;
}

.nav a:hover{opacity:1;}

/* HERO */
.hero{
    height:80vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero-box{
    text-align:center;
    padding:50px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

.hero h1{font-size:38px;}
.hero p{opacity:0.7;margin:15px 0;}

/* BUTTON */
.btn{
    display:inline-block;
    padding:12px 20px;
    border-radius:10px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    text-decoration:none;
    margin:5px;
}

/* SECTION */
.section{
    padding:80px 20px;
    text-align:center;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

.card{
    width:200px;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    opacity:0.6;
}

/* MOBILE */
@media(max-width:768px){
    .hero h1{font-size:26px;}
    .grid{flex-direction:column;}
    .card{width:90%;}
}
</style>

</head>

<body>

<div class="nav">
    <b>iviConstruct ⚡</b>
    <div>
        <a href="#services">Servicii</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<section class="hero">
    <div class="hero-box">
        <h1>Construcții moderne</h1>
        <p>Calitate și profesionalism</p>

        <a class="btn" href="#services">Servicii</a>
        <a class="btn" href="#contact">Contact</a>
    </div>
</section>

<section id="services" class="section">
    <h2>Servicii</h2>

    <div class="grid">
        <div class="card">Tencuială</div>
        <div class="card">Șapă</div>
        <div class="card">Gresie</div>
        <div class="card">Rigips</div>
        <div class="card">Pavaj</div>
    </div>
</section>

<section id="contact" class="section">
    <h2>Contact</h2>
    <p>📞 +40 XXX XXX XXX</p>
    <p>📧 mail@example.com</p>
</section>

<footer>
© 2026 iviConstruct
</footer>

</body>
</html>
